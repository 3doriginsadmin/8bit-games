<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily 8-Bit Games</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a14; color:#fff; font-family:'Courier New',monospace; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
    h1 { color:#f0c040; margin:20px 0; text-shadow:3px 3px 0 #000; font-size:2rem; text-align:center; }
    .subtitle { color:#ccc; margin-bottom:20px; font-size:0.9rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:15px; padding:20px; max-width:800px; width:100%; }
    .card { background:#16213e; border:3px solid #333; border-radius:12px; padding:15px; text-align:center; transition:0.15s; text-decoration:none; color:#fff; display:block; }
    .card:hover { border-color:#f0c040; transform:scale(1.03); }
    .card .emoji { font-size:2.5rem; }
    .card h2 { font-size:1rem; margin:8px 0 4px; color:#f0c040; }
    .card p { font-size:0.75rem; color:#aaa; }
    .date { margin-top:10px; color:#aaa; font-size:0.8rem; }
  </style>
</head>
<body>
  <h1>🎮 Daily 8-Bit Games</h1>
  <p class="subtitle">A brand new game appears every day – automatically & free!</p>
  <div class="grid" id="game-grid"></div>
  <p class="date">Last updated: <span id="last-updated"></span></p>

  <script>
    async function loadGames() {
      try {
        const response = await fetch('https://api.github.com/repos/3doriginsadmin/8bit-games/contents/games');
        const files = await response.json();
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';

        files.filter(f => f.name.endsWith('.html')).forEach(file => {
          // Create a readable name from the filename
          const name = file.name
            .replace('.html', '')
            .replace(/-/g, ' ')
            .replace(/\b\w/g, l => l.toUpperCase());

          const card = document.createElement('a');
          card.className = 'card';
          card.href = `games/${file.name}`;
          card.innerHTML = `
            <div class="emoji">🎮</div>
            <h2>${name}</h2>
            <p>Play now!</p>
          `;
          grid.appendChild(card);
        });

        document.getElementById('last-updated').textContent = new Date().toLocaleDateString();
      } catch (err) {
        console.error('Failed to load games:', err);
        document.getElementById('game-grid').innerHTML = '<p style="color:#ff3b3b">Could not load games. Make sure the repository is public.</p>';
      }
    }

    loadGames();
  </script>
</body>
</html>
